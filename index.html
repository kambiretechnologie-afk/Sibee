function generateWordDoc(bon) {
  const x = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

  const spc=(b,a)=>`<w:spacing w:before="${b}" w:after="${a}"/>`;

  const cell=(txt,o={})=>{

    const rpr=`${font}${sz(s)}${b?`<w:b/>`:""}${col?clr(col):""}`;
    return `<w:tc><w:tcPr><w:tcW w:w="${w}" w:type="dxa"/>${shd}${mar}</w:tcPr><w:p><w:pPr>${ppr}</w:pPr><w:r><w:rPr>${rpr}</w:rPr><w:t xml:space="preserve">${txt||"—"}</w:t></w:r></w:p></w:tc>`;
  };

  const bdr=`<w:tblBorders><w:top w:val="single" w:sz="4" w:color="D4B8B0"/><w:left w:val="single" w:sz="4" w:color="D4B8B0"/><w:bottom w:val="single" w:sz="4" w:color="D4B8B0"/><w:right w:val="single" w:sz="4" w:color="D4B8B0"/><w:insideH w:val="single" w:sz="4" w:color="D4B8B0"/><w:insideV w:val="single" w:sz="4" w:color="D4B8B0"/></w:tblBorders>`;
  const nobdr=`<w:tblBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/><w:insideH w:val="none"/><w:insideV w:val="none"/></w:tblBorders>`;
  const tblW=`<w:tblW w:w="8900" w:type="dxa"/>`;

  // Info rows
  const infoRows = [
    ["DATE",        x(dFmt(bon.date))],
    ["FOURNISSEUR", x(bon.fournisseur)],
    ["TÉLÉPHONE",   x(bon.telephone)],
    ["CONVOYEUR",   x(bon.convoyeur)],
    ["CHAUFFEUR",   x(bon.chauffeur)],
    ["N° MATRICULE",x(bon.matricule)],
  ].map(([l,v])=>`<w:tr>${cell(l,{w:3200,bg:BRD,b:true,col:"F0DFA0",s:9})}${cell(v,{w:5700,s:10})}</w:tr>`).join("");

  // Quality rows
  const qRows = qs.map((q,i)=>{
    const r=bon.rows[q.key]||{}, qty=parseFloat(r.qty)||0, px=parseFloat(r.prix)||0, m=qty*px;
    const bg=i%2===0?"FFFFFF":"FDF0ED";
    const lbl=x(q.label.toUpperCase()+(q.badge?` (${q.badge})`:""));
    return `<w:tr>${cell(lbl,{w:3000,b:true,col:BRD,s:10,bg})}${cell(x(fmt(qty)),{w:2000,center:true,s:10,bg})}${cell(x(fmt(px)),{w:2000,center:true,s:10,bg})}${cell(x(fmt(m)),{w:1900,center:true,b:true,s:10,bg})}</w:tr>`;
  }).join("");

  const docXml=[
    `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>`,
    `<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>`,
    para(run("SIBEE IMPORT-EXPORT",`<w:b/>${clr(BRD)}${sz(18)}${font}`),`${ctr}${spc(0,60)}`),
    para(run("Commerce de produits agricoles",`${clr(GLD)}${sz(9)}${font}`),`${ctr}${spc(0,40)}`),
    para("",`<w:pBdr><w:bottom w:val="double" w:sz="6" w:space="1" w:color="${BRD}"/></w:pBdr>${spc(0,100)}`),

    bon.numero?para(run(`N° ${x(bon.numero)}`,`<w:b/>${clr(GLD)}${sz(10)}${font}`),`${ctr}${spc(0,160)}`):para("",spc(0,40)),
    `<w:tbl><w:tblPr>${tblW}${bdr}</w:tblPr><w:tblGrid><w:gridCol w:w="3200"/><w:gridCol w:w="5700"/></w:tblGrid>${infoRows}</w:tbl>`,
    para("",spc(0,100)),
    `<w:tbl><w:tblPr>${tblW}${bdr}</w:tblPr><w:tblGrid><w:gridCol w:w="3000"/><w:gridCol w:w="2000"/><w:gridCol w:w="2000"/><w:gridCol w:w="1900"/></w:tblGrid>`,
    `<w:tr>${cell("QUALITÉ",{w:3000,bg:BRD,b:true,col:"F0DFA0",s:9})}${cell("QUANTITÉ (KG)",{w:2000,bg:BRD,b:true,col:"F0DFA0",center:true,s:9})}${cell("PRIX / KG",{w:2000,bg:BRD,b:true,col:"F0DFA0",center:true,s:9})}${cell("MONTANT FCFA",{w:1900,bg:BRD,b:true,col:"F0DFA0",center:true,s:9})}</w:tr>`,
    qRows,
    `</w:tbl>`,
    `<w:tbl><w:tblPr>${tblW}${bdr}</w:tblPr><w:tblGrid><w:gridCol w:w="7000"/><w:gridCol w:w="1900"/></w:tblGrid>`,
    `<w:tr>${cell("POIDS &amp; SOMME TOTAL",{w:7000,bg:BRD,b:true,col:"F0DFA0",s:9})}${cell(x(fmt(total))+" FCFA",{w:1900,center:true,b:true,col:GLD,bg:BRD,s:11})}</w:tr>`,
    `<w:tr>${cell("AVANCE VERSÉE",{w:7000,bg:"F8EEE8",b:true,col:BRD,s:9})}${cell(x(fmt(av))+" FCFA",{w:1900,center:true,b:true,col:BRD,bg:"F8EEE8",s:10})}</w:tr>`,
    `<w:tr>${cell("RESTE À PAYER",{w:7000,bg:BRD,b:true,col:"F0DFA0",s:9})}${cell(x(fmt(reste))+" FCFA",{w:1900,center:true,b:true,col:GLD,bg:BRD,s:11})}</w:tr>`,
    `</w:tbl>`,
    para("",spc(0,80)),
    para(run("Ladite avance reçue par le convoyeur",`${clr("888888")}${sz(9)}${font}`),`${ctr}<w:pBdr><w:bottom w:val="single" w:sz="4" w:space="2" w:color="D4B8B0"/></w:pBdr>${spc(80,60)}`),
    (()=>{ const d=new Date(); const hci=d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:"Africa/Abidjan"}); const dci=d.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric",timeZone:"Africa/Abidjan"}); return para(run(`Imprimé le ${x(dci)} à ${x(hci)} (Abidjan)`,`${clr("999999")}${sz(8)}${font}`),`${ctr}${spc(0,500)}`); })(),
    `<w:tbl><w:tblPr>${tblW}${nobdr}</w:tblPr><w:tblGrid><w:gridCol w:w="4200"/><w:gridCol w:w="500"/><w:gridCol w:w="4200"/></w:tblGrid>`,
    `<w:tr>${cell("Responsable",{w:4200,center:true,b:true,col:BRD,s:9})}${cell("",{w:500})}${cell("Convoyeur",{w:4200,center:true,b:true,col:BRD,s:9})}</w:tr>`,
    `<w:tr>${cell("",{w:4200})}${cell("",{w:500})}${cell("",{w:4200})}</w:tr>`,
    `<w:tr>${cell("Signature &amp; Cachet",{w:4200,center:true,col:"888888",s:8})}${cell("",{w:500})}${cell("Signature",{w:4200,center:true,col:"888888",s:8})}</w:tr>`,
    `</w:tbl>`,
    `<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/></w:sectPr>`,
    `</w:body></w:document>`
  ].join("");

  const ct=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;
  const wRels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`;
  const styles=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Georgia" w:hAnsi="Georgia"/><w:sz w:val="20"/></w:rPr></w:rPrDefault></w:docDefaults></w:styles>`;

  function buildZip(files){
    const e=new TextEncoder();
    function crc32(d){const t=[];for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):c>>>1;t[i]=c;}let c=0xFFFFFFFF;for(let i=0;i<d.length;i++)c=(c>>>8)^t[(c^d[i])&0xFF];return(c^0xFFFFFFFF)>>>0;}
    function u16(n){return new Uint8Array([n&0xFF,(n>>8)&0xFF]);}
    function u32(n){return new Uint8Array([n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF]);}
    function cat(...a){const l=a.reduce((s,x)=>s+x.length,0),o=new Uint8Array(l);let p=0;a.forEach(x=>{o.set(x,p);p+=x.length;});return o;}
    const parts=[],cd=[];let off=0;
    for(const[name,content]of files){
      const nb=e.encode(name),db=e.encode(content),crc=crc32(db);
      const lh=cat(new Uint8Array([0x50,0x4B,0x03,0x04]),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(db.length),u32(db.length),u16(nb.length),u16(0),nb,db);
      cd.push({nb,crc,size:db.length,off});parts.push(lh);off+=lh.length;
    }
    const cdo=off;
    const cdp=cd.map(({nb,crc,size,off:o})=>cat(new Uint8Array([0x50,0x4B,0x01,0x02]),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(size),u32(size),u16(nb.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(o),nb));
    const cds=cdp.reduce((s,p)=>s+p.length,0);
    const eocd=cat(new Uint8Array([0x50,0x4B,0x05,0x06]),u16(0),u16(0),u16(cd.length),u16(cd.length),u32(cds),u32(cdo),u16(0));
    const all=[...parts,...cdp,eocd],tot=all.reduce((s,p)=>s+p.length,0),out=new Uint8Array(tot);let pos=0;
    all.forEach(p=>{out.set(p,pos);pos+=p.length;});return out;
  }

  const zip=buildZip([["[Content_Types].xml",ct],["_rels/.rels",rels],["word/document.xml",docXml],["word/styles.xml",styles],["word/_rels/document.xml.rels",wRels]]);
  const blob=new Blob([zip],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  const url=URL.createObjectURL(blob),a=document.createElement("a");
  a.href=url;a.download=`Bon_SIBEE_${(bon.numero||bon.fournisseur||"doc").replace(/[^a-zA-Z0-9_-]/g,"_")}_${bon.date||"date"}.docx`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

// ── Composants de base ──
const Btn = ({v="outline",onClick,disabled,children,sm,full,type="button"})=>{
  const S={
    primary:{bg:C.dark,   color:C.goldL, border:"none"},
    gold:   {bg:C.gold,   color:C.dark,  border:"none"},
    danger: {bg:C.warnBg, color:C.warn,  border:`1.5px solid ${C.warn}`},
    word:   {bg:"#1F4E79",color:"#fff",  border:"none"},
    ghost:  {bg:"transparent",color:C.dark,border:`1.5px solid ${C.border}`},
    outline:{bg:"transparent",color:C.dark,border:`1.5px solid ${C.dark}`},
  };
  const st=S[v]||S.outline;
  return <button type={type} onClick={onClick} disabled={disabled}
    style={{padding:sm?"6px 12px":"9px 18px",fontFamily:"inherit",fontSize:sm?10:11,fontWeight:700,letterSpacing:1,
    textTransform:"uppercase",cursor:disabled?"not-allowed":"pointer",borderRadius:2,border:st.border,
    background:st.bg,color:st.color,opacity:disabled?0.4:1,whiteSpace:"nowrap",
    width:full?"100%":"auto",display:"inline-flex",alignItems:"center",gap:4,justifyContent:"center",transition:"opacity .15s"}}>
    {children}
  </button>;
};

const Badge = ({color=C.dark,bg=C.goldL,children})=>(
  <span style={{display:"inline-block",fontSize:10,background:bg,color,padding:"2px 8px",borderRadius:10,fontWeight:700,letterSpacing:0.5}}>{children}</span>
);

const Alert = ({type="info",children,onClose})=>{
  const colors={success:{bg:C.successBg,color:C.success,border:"#b7e0c4"},error:{bg:C.warnBg,color:C.warn,border:"#f0c0bc"},warn:{bg:"#fef9e7",color:"#b7770d",border:"#f9e79f"}};
  const s=colors[type]||colors.info;
  return <div style={{padding:"10px 14px",background:s.bg,border:`1px solid ${s.border}`,borderRadius:3,color:s.color,fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12}}>
    <span>{children}</span>
    {onClose&&<button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:s.color,fontSize:16,lineHeight:1,fontWeight:"bold"}}>×</button>}
  </div>;
};

  useEffect(()=>{
    (async()=>{
      setSyncStatus("loading");
      // 1. Chercher le bin ID en local
      let binId = null;
      try{ binId = localStorage.getItem("sibee-binid"); }catch(e){}

      if(!binId){
        // 2. Chercher un bin existant dans la collection
        try{
          const r=await fetch(`${JSONBIN_URL}/b?collectionId=${JSONBIN_COLLECTION}`,{
            headers:{"X-Master-Key":JSONBIN_KEY}
          });
          const d=await r.json();
          if(d.result && d.result.length>0){
            binId=d.result[d.result.length-1].record; // prendre le dernier
          }
        }catch(e){}
      }

      if(!binId){
        // 3. Créer un nouveau bin
        try{
          const r=await fetch(`${JSONBIN_URL}/b`,{
            method:"POST",
            headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY,"X-Collection-Id":JSONBIN_COLLECTION,"X-Bin-Name":"sibee-data"},
            body:JSON.stringify({bons:[],qualities:[],fournisseurs:[]})
          });
          const d=await r.json();
          binId=d.metadata?.id;
        }catch(e){}
      }

      if(binId){
        setBinId(binId);
        try{ localStorage.setItem("sibee-binid", binId); }catch(e){}
        // 4. Charger les données
        try{
          const r=await fetch(`${JSONBIN_URL}/b/${binId}/latest`,{
            headers:{"X-Master-Key":JSONBIN_KEY}
          });
          const d=await r.json();
          if(d.record){
            if(d.record.bons)         setBons(d.record.bons);
            if(d.record.qualities)    setQualities(d.record.qualities);
            if(d.record.fournisseurs) setFournisseurs(d.record.fournisseurs);
          }
          setSyncStatus("ok");
          setTimeout(()=>setSyncStatus(""),2000);
        }catch(e){ setSyncStatus("error"); }
      } else {
        setSyncStatus("error");
      }
    })();
  },[]);

  // Sauvegarde JSONBin
  const saveAll = async (newBons, newQualities, newFourns) => {
    if(!binId) return;
    setSyncStatus("saving");
    try{
      await fetch(`${JSONBIN_URL}/b/${binId}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},
        body:JSON.stringify({
          bons: newBons !== undefined ? newBons : bons,
          qualities: newQualities !== undefined ? newQualities : qualities,
          fournisseurs: newFourns !== undefined ? newFourns : fournisseurs,
          updatedAt: now()
        })
      });
      setSyncStatus("ok");
      setTimeout(()=>setSyncStatus(""),2000);
    }catch(e){ setSyncStatus("error"); }
  };
  const saveB = async (l) => saveAll(l, undefined, undefined);
  const saveQ = async (l) => saveAll(undefined, l, undefined);
  const saveF = async (l) => saveAll(undefined, undefined, l);

  // JSONBin gère la synchronisation automatiquement

  // ── Export Excel (CSV) ──
  function exportExcel(liste) {
    if(!liste.length) return;
    const rows = [
      ["N° Bon","Date","Fournisseur","Téléphone","Convoyeur","Chauffeur","Matricule","Total FCFA","Avance FCFA","Reste à payer FCFA"],
    ];
    liste.forEach(b=>{
      const qs=b.qualities||DEF_Q, t=totQ(qs,b.rows), av=parseFloat(b.avance)||0;
      rows.push([b.numero||"", dFmt(b.date), b.fournisseur||"", b.telephone||"", b.convoyeur||"", b.chauffeur||"", b.matricule||"", t, av, t-av]);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";")).join("\n");
    const bom = "\uFEFF"; // BOM pour Excel français
    const blob = new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob), a = document.createElement("a");
    a.href=url; a.download=`SIBEE_Bons_${today()}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  }

  // Notifications > 30 jours
  useEffect(()=>{
    const limit=30*24*60*60*1000, now30=Date.now();
    const alerts=bons
      .filter(b=>{ const t=totQ(b.qualities||DEF_Q,b.rows),av=parseFloat(b.avance)||0; return (t-av)>0; })
      .filter(b=>{ const created=b.createdAt?new Date(b.createdAt).getTime():0; return (now30-created)>limit; })
      .map(b=>({id:b.id,msg:`${b.fournisseur} — Reste de ${fmt(totQ(b.qualities||DEF_Q,b.rows)-parseFloat(b.avance||0))} FCFA depuis +30 jours`}));
    setNotifications(alerts);
  },[bons]);

  // Fournisseurs
  async function saveFourn(bon) {
    if(!bon.fournisseur?.trim()) return;
    const exists = fournisseurs.find(f=>f.nom.toLowerCase()===bon.fournisseur.toLowerCase());
    if(!exists) {
      const nf={id:Date.now(),nom:bon.fournisseur,telephone:bon.telephone||"",convoyeur:bon.convoyeur||"",addedAt:now()};
      const nl=[nf,...fournisseurs];
      setFournisseurs(nl); await saveF(nl);
    }
  }
  function handleFournChange(val) {
    setForm(p=>({...p,fournisseur:val}));
    setErrors(p=>({...p,fournisseur:undefined}));
    if(val.trim().length>=2) {
      const q=val.toLowerCase();
      setFournSugg(fournisseurs.filter(f=>f.nom.toLowerCase().includes(q)).slice(0,6));
    } else { setFournSugg([]); }
  }
  function selectFourn(f) {
    setForm(p=>({...p,fournisseur:f.nom,telephone:f.telephone||p.telephone,convoyeur:f.convoyeur||p.convoyeur}));
    setErrors(p=>({...p,fournisseur:undefined}));
    setFournSugg([]);
  }

  // CRUD Bons
  function handleNew(){
    const num=genBonNum(bons);
    setForm(newForm(qualities,num));
    setEditId(null); setErrors({});
    setView("form");
  }
  function handleEdit(bon){
    const rows={...bon.rows};
    const qs=bon.qualities||qualities;
    qs.forEach(q=>{if(!rows[q.key])rows[q.key]={qty:"",prix:""};});
    setForm({...bon,rows,qualities:qs});
    setEditId(bon.id); setErrors({});
    setView("form");
  }
  async function handleSave(){
    const errs=validate(form);
    if(Object.keys(errs).length){setErrors(errs);return;}
    setErrors({});
    const auditEntry={at:now(),by:"Utilisateur",action:editId?"Modification":"Création"};
    let bonForPrint;
    if(editId){
      const updated={...form,id:editId,updatedAt:now(),updatedBy:"Utilisateur",
        audit:[...(bons.find(b=>b.id===editId)?.audit||[]),auditEntry]};
      const nl=bons.map(b=>b.id===editId?updated:b);
      setBons(nl);await saveB(nl);
      bonForPrint=updated;
    } else {
      const bon={...form,id:Date.now(),createdAt:now(),createdBy:"Utilisateur",audit:[auditEntry]};
      const nl=[bon,...bons];
      setBons(nl);await saveB(nl);
      await saveFourn(bon);
      bonForPrint=bon;
    }
    setSaved(editId?"Bon modifié avec succès !":"Bon enregistré avec succès !");
    setPrintModal(bonForPrint);
  }
  async function handleDelete(id){
    const nl=bons.filter(b=>b.id!==id);setBons(nl);await saveB(nl);
    setDeleteModal(null);
    setSaved("Bon supprimé.");setTimeout(()=>setSaved(""),2000);
  }

  // Qualités
  const openQ=()=>{setEditQ(qualities.map(q=>({...q})));setNewLabel("");setNewBadge("");setQModal(true);};
  const moveQ=(i,d)=>{const a=[...editQ],j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];setEditQ(a);};
  const delQ=k=>setEditQ(e=>e.filter(q=>q.key!==k));
  const updQ=(k,f,v)=>setEditQ(e=>e.map(q=>q.key===k?{...q,[f]:v||null}:q));
  const addQ=()=>{if(!newLabel.trim())return;setEditQ(e=>[...e,{key:uid(),label:newLabel.trim(),badge:newBadge.trim()||null}]);setNewLabel("");setNewBadge("");};
  async function applyQ(){
    const nq=editQ.filter(q=>q.label?.trim());
    const nr={};nq.forEach(q=>{nr[q.key]=form.rows[q.key]||{qty:"",prix:""};});
    setQualities(nq);setForm(f=>({...f,qualities:nq,rows:nr}));
    await saveQ(nq);setQModal(false);
  }

  const total  = totQ(form.qualities,form.rows);
  const avance = parseFloat(form.avance)||0;
  const reste  = total-avance;

  const filtered = bons.filter(b=>{
    const q=search.trim().toLowerCase();
    const matchQ=!q||b.telephone?.includes(search.trim())||b.fournisseur?.toLowerCase().includes(q)||b.numero?.toLowerCase().includes(q);
    const matchD=!filterDate||b.date===filterDate;
    const t=totQ(b.qualities||DEF_Q,b.rows), av=parseFloat(b.avance)||0, reste=t-av;
    const matchS=!filterStatus||(filterStatus==="solde"?reste<=0:reste>0);
    return matchQ&&matchD&&matchS;
  });

  const thisMonth = new Date().toISOString().slice(0,7);
  const bonsMonth = bons.filter(b=>b.date?.startsWith(thisMonth));
  const totalMonth = bonsMonth.reduce((s,b)=>s+totQ(b.qualities||DEF_Q,b.rows),0);
  const totalReste = bons.reduce((s,b)=>{ const t=totQ(b.qualities||DEF_Q,b.rows),av=parseFloat(b.avance)||0; return s+Math.max(0,t-av); },0);
  const totalVol   = bons.reduce((s,b)=>{ const qs=b.qualities||DEF_Q; return s+qs.reduce((ss,q)=>ss+(parseFloat(b.rows?.[q.key]?.qty)||0),0); },0);
  const topFourns  = Object.entries(bons.reduce((acc,b)=>{ if(b.fournisseur){acc[b.fournisseur]=(acc[b.fournisseur]||0)+1;} return acc; },{})).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const volParQ = qualities.map(q=>({ label:q.label, vol:bons.reduce((s,b)=>s+(parseFloat(b.rows?.[q.key]?.qty)||0),0) }));

  /* CSS */
  const css=`

    @media(max-width:460px){.qrow{grid-template-columns:30px 1fr 30px;} .qrow .bc{display:none;} .addrow{grid-template-columns:1fr auto;} .addrow .bi{display:none;}}

    /* Filtres liste */
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .filter-bar input{flex:1;min-width:140px;}
    @media(max-width:480px){.filter-bar{flex-direction:column;} .filter-bar *{width:100%;}}

    /* Audit */
    .audit-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid ${C.border};font-size:12px;align-items:flex-start;}

    /* Autocomplete */
    .sugg-box{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid ${C.gold};border-top:none;border-radius:0 0 4px 4px;z-index:200;max-height:180px;overflow-y:auto;}
    .sugg-item{padding:9px 12px;cursor:pointer;font-size:13px;} .sugg-item:hover{background:${C.bg};}

  /* ─── MODAL QUALITÉS ─── */

            </div>
          ))}
          <div style={{marginTop:16,padding:14,background:C.bg,borderRadius:2,border:`1.5px dashed ${C.gold}`}}>

            <Btn v="ghost" onClick={()=>setQModal(false)} sm>Annuler</Btn>
            <Btn v="primary" onClick={applyQ} sm>✓ Appliquer ({editQ.length})</Btn>
          </div>
        </div>
      </div>
    </div>
  );

  /* ─── MODAL SUPPRESSION ─── */
  const DeleteModal=()=>{
    if(!deleteModal) return null;
    const bon=bons.find(b=>b.id===deleteModal);
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:C.white,borderRadius:6,width:"100%",maxWidth:"min(380px,95vw)",boxShadow:"0 20px 60px rgba(0,0,0,0.4)",overflow:"hidden"}}>
          <div style={{background:C.warn,padding:"20px 24px",textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:8}}>🗑️</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:18,fontFamily:"Georgia,serif"}}>Supprimer ce bon ?</div>
          </div>
          <div style={{padding:"16px 24px",background:C.bg,borderBottom:`1px solid ${C.border}`,textAlign:"center"}}>
            <div style={{fontWeight:700,color:C.dark,fontSize:15}}>{bon?.fournisseur||"—"}</div>
            {bon?.numero&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>{bon.numero} · {dFmt(bon?.date)}</div>}
            <div style={{fontSize:13,color:C.warn,marginTop:8,fontWeight:600}}>Cette action est irréversible.</div>
          </div>
          <div style={{padding:"16px 24px",display:"flex",gap:10}}>
            <button onClick={()=>setDeleteModal(null)}
              style={{flex:1,padding:"12px",background:"transparent",color:C.muted,border:`1.5px solid ${C.border}`,borderRadius:4,fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              Annuler
            </button>
            <button onClick={()=>handleDelete(deleteModal)}
              style={{flex:1,padding:"12px",background:C.warn,color:"#fff",border:"none",borderRadius:4,fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              🗑 Supprimer
            </button>
          </div>
        </div>
      </div>
    );
  };

  /* ─── MODAL IMPRESSION ─── */
  const PrintModal=()=>{
    if(!printModal) return null;
    const t=totQ(printModal.qualities||DEF_Q,printModal.rows);
    const av=parseFloat(printModal.avance)||0;
    const reste=t-av;
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:C.white,borderRadius:6,width:"100%",maxWidth:"min(400px,95vw)",boxShadow:"0 24px 80px rgba(0,0,0,0.4)",overflow:"hidden"}}>

          {/* Header vert succès */}
          <div style={{background:"#1a6b3a",padding:"28px 24px",textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:10}}>✅</div>
            <div style={{color:"#fff",fontWeight:800,fontSize:22,fontFamily:"Georgia,serif",letterSpacing:1}}>
              Bon enregistré !
            </div>
            {printModal.numero&&(
              <div style={{display:"inline-block",marginTop:8,background:"rgba(255,255,255,0.2)",color:"#fff",fontSize:13,fontWeight:700,padding:"4px 14px",borderRadius:20,letterSpacing:1}}>
                {printModal.numero}
              </div>
            )}
          </div>

          {/* Résumé du bon */}
          <div style={{padding:"18px 24px",background:C.bg,borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Fournisseur</span>
              <span style={{fontSize:14,fontWeight:700,color:C.dark}}>{printModal.fournisseur||"—"}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:av>0?10:0}}>
              <span style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Total</span>
              <span style={{fontSize:16,fontWeight:800,color:C.dark}}>{fmt(t)} <span style={{fontSize:11}}>FCFA</span></span>
            </div>
            {av>0&&<>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Avance</span>
                <span style={{fontSize:14,fontWeight:600,color:C.dark}}>{fmt(av)} <span style={{fontSize:11}}>FCFA</span></span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:`1px dashed ${C.border}`}}>
                <span style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Reste à payer</span>
                <span style={{fontSize:15,fontWeight:800,color:reste>0?C.warn:"#1a6b3a"}}>{fmt(reste)} <span style={{fontSize:11}}>FCFA</span></span>
              </div>
            </>}
          </div>

          {/* Boutons */}
          <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:12}}>
            <button
              onClick={()=>{ generateWordDoc(printModal); setPrintModal(null); setSaved(""); setView("list"); }}
              style={{width:"100%",padding:"14px",background:"#1F4E79",color:"#fff",border:"none",borderRadius:4,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,letterSpacing:0.5}}>
              <span style={{fontSize:20}}>📄</span> Imprimer le bon (Word)
            </button>
            <button
              onClick={()=>{ setPrintModal(null); setSaved(""); setView("list"); }}
              style={{width:"100%",padding:"12px",background:"transparent",color:C.muted,border:`1.5px solid ${C.border}`,borderRadius:4,fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",letterSpacing:0.5}}>
              Continuer sans imprimer →
            </button>
          </div>

        </div>
      </div>
    );
  };

  /* ─── DASHBOARD ─── */
  // Données graphique mensuel (6 derniers mois)
  const monthlyData = (() => {
    const months = [];
    const now = new Date();
    for(let i=5; i>=0; i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const key = d.toISOString().slice(0,7);
      const label = d.toLocaleDateString("fr-FR",{month:"short",year:"2-digit"});
      const monthBons = bons.filter(b=>b.date?.startsWith(key));
      const total = monthBons.reduce((s,b)=>s+totQ(b.qualities||DEF_Q,b.rows),0);
      const encaisse = monthBons.reduce((s,b)=>s+(parseFloat(b.avance)||0),0);
      months.push({label, total, encaisse, count:monthBons.length});
    }
    return months;
  })();
  const maxMonthVal = Math.max(...monthlyData.map(m=>m.total), 1);

  const Dashboard=()=>{
    const maxVol=Math.max(...volParQ.map(v=>v.vol),1);
    const nowCi=new Date();
    const heureCi=nowCi.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:"Africa/Abidjan"});
    const dateCi=nowCi.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric",timeZone:"Africa/Abidjan"});
    return <div style={wrap}>
      <div style={{marginBottom:20,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:"clamp(18px,5vw,26px)",color:C.dark,fontWeight:"bold"}}>Tableau de bord</div>
          <div style={{fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginTop:4}}>{dateCi}</div>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,marginTop:6,background:C.dark,color:C.goldL,padding:"4px 12px",borderRadius:20}}>
            <span style={{fontSize:13}}>🕐</span>
            <span style={{fontWeight:700,fontSize:13,letterSpacing:1}}>{heureCi}</span>
            <span style={{fontSize:10,opacity:0.7}}>Abidjan</span>
          </div>
        </div>
        <Btn v="primary" onClick={handleNew}>+ Nouveau bon</Btn>
      </div>

      {notifications.map(n=>(
        <Alert key={n.id} type="warn" onClose={()=>setNotifications(p=>p.filter(x=>x.id!==n.id))}>⚠ {n.msg}</Alert>
      ))}

      <div className="dash-grid">
        {[
          {label:"Bons ce mois",val:bonsMonth.length,icon:"📋",sub:`${bons.length} total`},
          {label:"Volume encaissé",val:fmt(totalMonth)+" F",icon:"💰",sub:"ce mois"},
          {label:"Restes à payer",val:fmt(totalReste)+" F",icon:"⏳",sub:"tous bons",alert:totalReste>0},
          {label:"Volume ignames",val:fmt(Math.round(totalVol))+" Kg",icon:"🌿",sub:"total cumulé"},
        ].map(k=>(
          <div key={k.label} style={{background:C.white,border:`1px solid ${k.alert?C.warn:C.border}`,borderRadius:3,padding:"clamp(10px,2vw,16px)",boxShadow:"0 2px 10px rgba(107,15,26,0.07)",borderLeft:`4px solid ${k.alert?C.warn:C.dark}`}}>
            <div style={{fontSize:24,marginBottom:6}}>{k.icon}</div>
            <div style={{fontWeight:800,fontSize:"clamp(14px,3vw,18px)",color:k.alert?C.warn:C.dark,lineHeight:1.2}}>{k.val}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4,textTransform:"uppercase",letterSpacing:1}}>{k.label}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>

      <div className="dash2">
        <div style={cardS}>
          <div style={secHead()}>🏆 Top fournisseurs</div>
          <div style={{padding:16}}>
            {topFourns.length===0?<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"20px 0"}}>Aucun bon enregistré</div>
            :topFourns.map(([nom,count],i)=>(
              <div key={nom} className="bar-wrap">
                <div style={{width:20,fontSize:11,fontWeight:700,color:C.muted,flexShrink:0}}>#{i+1}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.dark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nom}</div>
                  <div className="bar-track"><div className="bar-fill" style={{width:`${(count/topFourns[0][1])*100}%`}}/></div>
                </div>
                <div style={{fontSize:12,fontWeight:700,color:C.dark,flexShrink:0,marginLeft:8}}>{count} bon{count>1?"s":""}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={cardS}>
          <div style={secHead()}>🌿 Volumes par qualité</div>
          <div style={{padding:16}}>
            {volParQ.map(q=>(
              <div key={q.label} className="bar-wrap">
                <div style={{width:80,fontSize:12,fontWeight:600,color:C.dark,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.label}</div>
                <div className="bar-track"><div className="bar-fill" style={{width:`${(q.vol/maxVol)*100}%`,background:C.main}}/></div>
                <div style={{fontSize:12,fontWeight:700,color:C.dark,flexShrink:0,marginLeft:8}}>{fmt(Math.round(q.vol))} Kg</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Graphique mensuel */}
      <div style={{...cardS,marginBottom:20}}>
        <div style={secHead()}>📈 Évolution mensuelle (6 derniers mois)</div>
        <div style={{padding:"20px 16px"}}>
          {/* Barres */}
          <div style={{display:"flex",alignItems:"flex-end",gap:"clamp(4px,2vw,12px)",height:140,marginBottom:8}}>
            {monthlyData.map((m,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:9,fontWeight:700,color:C.dark,textAlign:"center",whiteSpace:"nowrap"}}>
                  {m.total>0?fmt(Math.round(m.total/1000))+"k":""}
                </div>
                <div style={{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:110}}>
                  {/* Barre total */}
                  <div style={{flex:1,background:`linear-gradient(to top, ${C.dark}, ${C.main})`,borderRadius:"3px 3px 0 0",
                    height:`${Math.max((m.total/maxMonthVal)*100,m.total>0?4:0)}%`,transition:"height .4s",position:"relative"}}>
                    {m.count>0&&<div style={{position:"absolute",top:-16,left:"50%",transform:"translateX(-50%)",fontSize:9,fontWeight:700,color:C.muted,whiteSpace:"nowrap"}}>{m.count}b</div>}
                  </div>
                  {/* Barre encaissé */}
                  <div style={{flex:1,background:`linear-gradient(to top, #1a6b3a, #27ae60)`,borderRadius:"3px 3px 0 0",
                    height:`${Math.max((m.encaisse/maxMonthVal)*100,m.encaisse>0?3:0)}%`,transition:"height .4s",opacity:0.85}}/>
                </div>
              </div>
            ))}
          </div>
          {/* Labels mois */}
          <div style={{display:"flex",gap:"clamp(4px,2vw,12px)"}}>
            {monthlyData.map((m,i)=>(
              <div key={i} style={{flex:1,textAlign:"center",fontSize:10,color:C.muted,fontWeight:600}}>{m.label}</div>
            ))}
          </div>
          {/* Légende */}
          <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:12}}>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}>
              <div style={{width:12,height:12,borderRadius:2,background:C.dark}}/> Total facturation
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}>
              <div style={{width:12,height:12,borderRadius:2,background:"#1a6b3a"}}/> Avances encaissées
            </div>
          </div>
        </div>
      </div>

      <div style={cardS}>
        <div style={secHead()}>
          <span>📋 Derniers bons enregistrés</span>
          <Btn v="ghost" sm onClick={()=>setView("list")}>Voir tout →</Btn>
        </div>
        {bons.slice(0,5).map(b=>{
          const qs=b.qualities||DEF_Q,t=totQ(qs,b.rows),av=parseFloat(b.avance)||0,r=t-av;
          return <div key={b.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:`1px solid ${C.border}`,gap:10,flexWrap:"wrap"}}>
            <div>
              <span style={{fontWeight:700,color:C.dark,fontSize:14}}>{b.fournisseur||"—"}</span>
              {b.numero&&<span style={{marginLeft:8,fontSize:11,color:C.muted}}>{b.numero}</span>}
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{dFmt(b.date)} · {b.convoyeur||"—"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:800,color:C.dark,fontSize:14}}>{fmt(t)} FCFA</div>
              {r>0&&<div style={{fontSize:11,color:C.warn}}>Reste : {fmt(r)} FCFA</div>}
            </div>
          </div>;
        })}
        {bons.length===0&&<div style={{padding:"24px",textAlign:"center",color:C.muted,fontSize:13}}>Aucun bon enregistré pour le moment.</div>}
      </div>


    </div>;
  };

  /* ─── FORMULAIRE ─── */
  const FormView=()=>(
    <div style={wrap}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20,flexWrap:"wrap"}}>
        <Btn v="ghost" onClick={()=>{setView("list");setEditId(null);}}>← Retour</Btn>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:"clamp(17px,4vw,24px)",color:C.dark,fontWeight:"bold"}}>{editId?"✏️ Modifier le bon":"➕ Nouveau bon"}</div>
          {form.numero&&<div style={{fontSize:12,color:C.gold,fontWeight:700,marginTop:2}}>{form.numero}</div>}
        </div>
      </div>

      {saved&&<Alert type="success">{saved}</Alert>}
      {errors.rows&&<Alert type="error">⚠ {errors.rows}</Alert>}

      <div style={cardS}>
        <div style={secHead()}>Informations générales</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
          {/* Chaque champ = label + input stables, pas de display:contents */}
          {[
            {key:"date",    label:"Date *",              type:"date", req:true},
            {key:"_fourn",  label:"Fournisseur *",       type:"fourn",req:true},
            {key:"telephone",label:"Téléphone *",        type:"tel",  req:true},
            {key:"convoyeur",label:"Convoyeur",          type:"text", req:false},
            {key:"chauffeur",label:"Chauffeur",          type:"text", req:false},
            {key:"matricule",label:"N° Matricule camion",type:"text", req:false},
          ].map(({key,label,type,req})=>(
            <div key={key} style={{borderBottom:`1px solid ${C.border}`,borderRight:`1px solid ${C.border}`}}>
              <div style={iLabel}>{label}</div>
              <div style={{padding:"8px 14px",position:"relative"}}>
                {type==="date"&&<div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><input type="date" style={{...inp,padding:"2px 0",flex:1}} value={form.date||""} onChange={e=>{setForm(p=>({...p,date:e.target.value}));setErrors(p=>({...p,date:undefined}));}}/>{!editId&&<button type="button" onClick={()=>setForm(p=>({...p,date:today()}))} style={{fontSize:10,background:C.goldL,color:C.dark,border:"none",borderRadius:2,padding:"3px 8px",cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>📅 Aujourd'hui</button>}</div>}
                {type==="fourn"&&<>
                  <input style={inp} value={form.fournisseur||""} onChange={e=>handleFournChange(e.target.value)} onBlur={()=>setTimeout(()=>setFournSugg([]),150)} placeholder="Nom du fournisseur"/>
                  {fournSugg.length>0&&<div className="sugg-box">{fournSugg.map(f=><div key={f.id} className="sugg-item" onClick={()=>selectFourn(f)}><strong>{f.nom}</strong> <span style={{color:C.muted}}>📞 {f.telephone||"—"}</span></div>)}</div>}
                </>}
                {type!=="date"&&type!=="fourn"&&<input style={inp} type={type} value={form[key]||""} onChange={e=>{setForm(p=>({...p,[key]:e.target.value}));setErrors(p=>({...p,[key]:undefined}));}} placeholder={label}/>}
                <div style={{fontSize:11,color:C.warn,height:16,marginTop:2,lineHeight:"16px"}}>
                  {(key==="date"&&errors.date)?"⚠ "+errors.date
                  :(key==="_fourn"&&errors.fournisseur)?"⚠ "+errors.fournisseur
                  :(errors[key])?"⚠ "+errors[key]:""}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={cardS}>
        <div style={secHead()}>
          <span>Qualités &amp; Quantités</span>
          <button onClick={openQ} style={{background:"rgba(212,168,67,0.15)",border:`1px solid ${C.gold}`,color:C.gold,padding:"5px 12px",fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",cursor:"pointer",borderRadius:2}}>⚙ Gérer</button>
        </div>
        <div className="tbl-wrap"><div className="tbl-min">
          {TableHead()}
          {(form.qualities||[]).map((q,i)=>(
            TRow({key:q.key, q, i, value:form.rows[q.key], onChange:(f,v)=>{setForm(p=>({...p,rows:{...p.rows,[q.key]:{...p.rows[q.key],[f]:v}}}));setErrors(p=>({...p,rows:undefined}));}})
          ))}
        </div></div>
        {Totaux({t:total, av:avance, r:reste, edit:true})}
        <div style={{textAlign:"center",padding:"8px",fontSize:12,color:C.muted,fontStyle:"italic",borderTop:`1px solid ${C.border}`}}>Ladite avance reçue par le convoyeur</div>
      </div>

      <div className="actions">
        
        <Btn v="primary" onClick={handleSave}>{editId?"💾 Enregistrer les modifications":"💾 Enregistrer"}</Btn>
      </div>
    </div>
  );

  /* ─── LISTE ─── */
  const ListView=()=>(
    <div style={wrap}>
      <div style={{marginBottom:20,display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:"clamp(18px,5vw,26px)",color:C.dark,fontWeight:"bold"}}>Bons de Déchargement</div>
          <div style={{fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginTop:4}}>{bons.length} bon{bons.length>1?"s":""} · {filtered.length} affiché{filtered.length>1?"s":""}</div>
        </div>
        <Btn v="primary" onClick={handleNew}>+ Nouveau bon</Btn>
      </div>

      {saved&&<Alert type="success" onClose={()=>setSaved("")}>{saved}</Alert>}

      <div style={{...cardS,padding:14,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <input style={{flex:1,minWidth:180,padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:2,fontFamily:"inherit",fontSize:13,outline:"none",background:C.white}}
          placeholder="🔍 Rechercher..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <input type="date" style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:2,fontFamily:"inherit",fontSize:13,outline:"none",background:C.white}}
          value={filterDate} onChange={e=>setFilterDate(e.target.value)}/>
        {/* Filtres statut */}
        {["","nonsolde","solde"].map(s=>(
          <button key={s} onClick={()=>setFilterStatus(s)}
            style={{padding:"7px 12px",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer",borderRadius:2,border:"none",
              background:filterStatus===s?(s==="solde"?"#1a6b3a":s==="nonsolde"?C.warn:C.dark):"rgba(107,15,26,0.08)",
              color:filterStatus===s?"#fff":(s==="solde"?"#1a6b3a":s==="nonsolde"?C.warn:C.muted),
              whiteSpace:"nowrap"}}>
            {s===""?"Tous":s==="solde"?"✅ Soldés":"⏳ Non soldés"}
          </button>
        ))}
        {(search||filterDate||filterStatus)&&<Btn v="ghost" sm onClick={()=>{setSearch("");setFilterDate("");setFilterStatus("");}}>✕ Effacer</Btn>}
        <button onClick={()=>exportExcel(filtered)} disabled={!filtered.length}
          style={{padding:"8px 14px",background:"#217346",color:"#fff",border:"none",borderRadius:2,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:filtered.length?"pointer":"not-allowed",opacity:filtered.length?1:0.4,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
          📥 Export Excel
        </button>

      </div>

      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:44,marginBottom:12}}>📋</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:18,color:"#ccc"}}>{bons.length===0?"Aucun bon enregistré":"Aucun résultat"}</div>
          {bons.length===0&&<div style={{marginTop:16}}><Btn v="primary" onClick={handleNew}>+ Créer le premier bon</Btn></div>}
        </div>
      ):filtered.map(bon=>{
        const qs=bon.qualities||DEF_Q,t=totQ(qs,bon.rows),av=parseFloat(bon.avance)||0,r=t-av;
        return <div key={bon.id} className="bon-card">
          <div className="bon-hd" onClick={()=>setShowAudit(showAudit===bon.id?null:bon.id)}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                <span style={{fontFamily:"Georgia,serif",fontSize:15,color:C.dark,fontWeight:"bold"}}>{bon.fournisseur||"Sans nom"}</span>
                {bon.numero&&<Badge color={C.dark} bg={C.goldL}>{bon.numero}</Badge>}
                <Badge color={C.dark} bg={C.bg}>{dFmt(bon.date)}</Badge>
                {bon.updatedAt&&<span style={{fontSize:10,color:C.muted,fontStyle:"italic"}}>✏ modifié</span>}
              </div>
              <div style={{fontSize:12,color:C.muted,display:"flex",flexWrap:"wrap",gap:"3px 12px"}}>
                <span>📞 {bon.telephone||"—"}</span>
                <span>🚛 {bon.convoyeur||"—"}</span>
                {bon.matricule&&<span>🚗 {bon.matricule}</span>}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontWeight:800,fontSize:16,color:C.dark}}>{fmt(t)}<span style={{fontSize:10,fontWeight:500,marginLeft:3}}>FCFA</span></div>
              <div style={{fontSize:11,color:r>0?C.warn:C.success,fontWeight:600}}>{r>0?`⏳ Reste : ${fmt(r)} FCFA`:"✅ Soldé"}</div>
            </div>
          </div>

          {showAudit===bon.id&&(bon.audit||[]).length>0&&(
            <div style={{padding:"10px 16px",background:"#fafafa",borderTop:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.dark,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>📜 Historique</div>
              {(bon.audit||[]).map((a,i)=>(
                <div key={i} className="audit-row">
                  <span style={{fontSize:18}}>{a.action==="Création"?"🟢":"🔵"}</span>
                  <div><strong style={{color:C.dark}}>{a.action}</strong> par <strong>{a.by}</strong><div style={{color:C.muted}}>{new Date(a.at).toLocaleString("fr-FR")}</div></div>
                </div>
              ))}
            </div>
          )}

          <div className="bon-act">
            <Btn v="outline" sm onClick={()=>handleEdit(bon)}>✏️ Modifier</Btn>
            <Btn v="word" sm onClick={()=>generateWordDoc(bon)}>📄 Word</Btn>
            <div style={{flex:1}}/>
            <Btn v="danger" sm onClick={()=>setDeleteModal(bon.id)}>🗑 Supprimer</Btn>
          </div>
        </div>;
      })}
    </div>
  );

  /* ─── FOURNISSEURS ─── */
  const FournisseursView=()=>(
    <div style={wrap}>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:"clamp(17px,4vw,24px)",color:C.dark,fontWeight:"bold"}}>Annuaire Fournisseurs</div>
        <div style={{fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginTop:4}}>{fournisseurs.length} fournisseur{fournisseurs.length>1?"s":""}</div>
      </div>
      {fournisseurs.length===0?
        <div style={{textAlign:"center",padding:"50px",color:C.muted,fontSize:13}}>Les fournisseurs s'ajoutent automatiquement lors de l'enregistrement des bons.</div>
      :<div style={cardS}>
        {fournisseurs.map((f,i)=>(
          <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:i<fournisseurs.length-1?`1px solid ${C.border}`:"none",flexWrap:"wrap",gap:8}}>
            <div>
              <div style={{fontWeight:700,color:C.dark,fontSize:14}}>{f.nom}</div>
              <div style={{fontSize:12,color:C.muted}}>📞 {f.telephone||"—"} · 🚛 {f.convoyeur||"—"}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Badge color={C.dark} bg={C.goldL}>{bons.filter(b=>b.fournisseur===f.nom).length} bon{bons.filter(b=>b.fournisseur===f.nom).length>1?"s":""}</Badge>
              <span style={{fontSize:11,color:C.muted}}>Ajouté le {dFmt(f.addedAt?.split("T")[0])}</span>
            </div>
          </div>
        ))}
      </div>}
    </div>
  );

  /* ─── RENDER ─── */
  const navItems=[
    {id:"dashboard",label:"Tableau de bord",icon:"📊"},
    {id:"list",label:`Bons (${bons.length})`,icon:"📋"},
    {id:"fournisseurs",label:"Fournisseurs",icon:"👥"},
  ];

  // ── ÉCRAN DE CONNEXION ──
  const LoginScreen = () => (
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg, ${C.dark} 0%, #3d0910 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.white,borderRadius:8,width:"100%",maxWidth:"min(400px,95vw)",overflow:"hidden",boxShadow:"0 30px 80px rgba(0,0,0,0.5)"}}>
        {/* Header */}
        <div style={{background:C.dark,padding:"36px 24px",textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:10}}>🌿</div>
          <div style={{fontFamily:"Georgia,serif",color:C.goldL,fontSize:28,fontWeight:"bold",letterSpacing:3}}>SIBEE</div>
          <div style={{color:C.gold,fontSize:11,letterSpacing:4,textTransform:"uppercase",marginTop:6}}>Import-Export</div>
        </div>
        {/* Form */}
        <div style={{padding:"32px 28px"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.dark,fontWeight:"bold",marginBottom:6,textAlign:"center"}}>Connexion sécurisée</div>
          <div style={{fontSize:12,color:C.muted,textAlign:"center",marginBottom:24}}>Entrez le mot de passe pour accéder à l'application</div>

          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.dark,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Mot de passe</label>
          <input
            type="password"
            value={pwInput}
            onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
            onKeyDown={e=>{if(e.key==="Enter"){if(pwInput===APP_PASSWORD){setIsAuth(true);localStorage.setItem("sibee-auth","1");}else{setPwError(true);setPwInput("");}}}}
            placeholder="••••••••"
            autoFocus
            style={{width:"100%",padding:"14px 16px",border:`2px solid ${pwError?C.warn:C.border}`,borderRadius:4,fontFamily:"inherit",fontSize:16,outline:"none",marginBottom:pwError?8:16,transition:"border .2s"}}
          />
          {pwError&&<div style={{color:C.warn,fontSize:12,fontWeight:600,marginBottom:12}}>⚠ Mot de passe incorrect</div>}

          <button
            onClick={()=>{if(pwInput===APP_PASSWORD){setIsAuth(true);localStorage.setItem("sibee-auth","1");}else{setPwError(true);setPwInput("");} }}
            style={{width:"100%",padding:"14px",background:C.dark,color:C.goldL,border:"none",borderRadius:4,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
            🔓 Accéder à l'application
          </button>
          <div style={{marginTop:20,padding:"12px 14px",background:C.bg,borderRadius:4,fontSize:11,color:C.muted,textAlign:"center"}}>
            🔐 Accès réservé au personnel SIBEE
          </div>
        </div>
      </div>
    </div>
  );

  // Vérifier auth au démarrage
  useEffect(()=>{ try{ if(localStorage.getItem("sibee-auth")==="1") setIsAuth(true); }catch(e){} },[]);

  if(!isAuth) return <LoginScreen/>;

  return (
    <>
      <style>{css}</style>
      {qModal&&QModal()}
      {deleteModal&&DeleteModal()}
      {printModal&&PrintModal()}

      <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',Georgia,sans-serif",color:C.text}}>
        <nav style={{background:C.dark,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 clamp(8px,3vw,24px)",height:"clamp(50px,8vw,60px)",boxShadow:"0 2px 16px rgba(107,15,26,0.4)",position:"sticky",top:0,zIndex:100}}>
          <div style={{display:"flex",alignItems:"center",gap:"clamp(6px,2vw,20px)"}}>
            <div>
              <div style={{fontFamily:"Georgia,serif",color:C.goldL,fontSize:"clamp(13px,3vw,18px)",letterSpacing:"clamp(1px,0.5vw,2px)",fontWeight:"bold"}}>SIBEE</div>
              <div className="nav-sub">Import-Export</div>
            </div>
            <div className="nav-links" style={{display:"flex",gap:2}}>
              {navItems.map(n=>(
                <button key={n.id} onClick={()=>setView(n.id)}
                  style={{padding:"clamp(5px,1.5vw,7px) clamp(6px,2vw,14px)",fontFamily:"inherit",fontSize:"clamp(9px,1.5vw,11px)",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",border:"none",background:view===n.id?C.gold:"transparent",color:view===n.id?C.dark:C.goldL,cursor:"pointer",borderRadius:2,display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>
                  {n.icon} <span className="nav-label">{n.label}</span>
                  {n.id==="list"&&notifications.length>0&&<span className="notif-dot"/>}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div title="Statut synchronisation JSONBin"
              style={{padding:"5px 10px",background:syncStatus==="error"?"rgba(192,57,43,0.15)":syncStatus==="loading"||syncStatus==="saving"?"rgba(212,168,67,0.15)":"rgba(26,107,58,0.15)",border:`1px solid ${syncStatus==="error"?C.warn:syncStatus==="loading"||syncStatus==="saving"?C.gold:"#4CAF50"}`,borderRadius:3,fontSize:11,fontWeight:700,color:syncStatus==="error"?C.warn:syncStatus==="loading"||syncStatus==="saving"?C.goldD:"#4CAF50",display:"flex",alignItems:"center",gap:5,cursor:"default"}}>
              {syncStatus==="loading"?"⏳ Chargement":syncStatus==="saving"?"💾 Sauvegarde":syncStatus==="error"?"❌ Hors ligne":"☁️ Synchronisé"}
            </div>
            <Btn v="gold" sm onClick={handleNew}>+ Bon</Btn>
            <button onClick={()=>{setIsAuth(false);localStorage.removeItem("sibee-auth");}}
              title="Se déconnecter"
              style={{padding:"6px 10px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:3,cursor:"pointer",fontSize:12,color:C.goldL}}>
              🔒
            </button>
          </div>
        </nav>

        {view==="form"&&<div style={{background:C.main,padding:"6px 14px",fontSize:11,color:C.goldL}}>
          <span style={{cursor:"pointer",opacity:0.7}} onClick={()=>setView("list")}>Bons</span>
          <span style={{margin:"0 6px"}}>›</span>
          <span>{editId?"Modifier":"Nouveau bon"}</span>
        </div>}

        {view==="dashboard"    && Dashboard()}
        {view==="form"         && FormView()}
        {view==="list"         && ListView()}
        {view==="fournisseurs" && FournisseursView()}
      </div>
    </>
  );
}


    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App/>);
  </script>
</body>
</html>
